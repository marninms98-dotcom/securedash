<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Quote — SecureWorks WA</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f7; font-family: -apple-system, sans-serif; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #EAEDF0; border-top-color: #F15A29; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px; color: #991B1B; }
  </style>
</head>
<body>
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="color:#6B7280;font-size:14px;">Loading your quote...</div>
  </div>
  <script>
    (async function() {
      var params = new URLSearchParams(window.location.search);
      var src = params.get('src');
      if (!src) {
        document.getElementById('loadingState').innerHTML = '<div class="error"><h2>Invalid link</h2><p>Please contact SecureWorks WA for assistance.</p></div>';
        return;
      }
      try {
        var res = await fetch(src);
        if (!res.ok) throw new Error('Failed to load');
        var html = await res.text();
        document.open();
        document.write(html);
        document.close();
      } catch(e) {
        document.getElementById('loadingState').innerHTML = '<div class="error"><h2>Unable to load quote</h2><p>Please try again or contact SecureWorks WA.</p></div>';
      }
    })();
  </script>
</body>
</html>
